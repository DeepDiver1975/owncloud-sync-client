version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      # The objc2 ecosystem crates are version-coupled and released in
      # lockstep, so they must be bumped together — a lone bump (e.g.
      # objc2-foundation 0.2->0.3) leaves two incompatible copies in the tree
      # and breaks the macOS build. Group them with no update-types filter so
      # even breaking 0.x bumps land in a single, reviewable PR. Listed before
      # cargo-deps because Dependabot assigns each crate to the first matching
      # group.
      objc2:
        patterns:
          - "objc2"
          - "objc2-*"
      # accesskit and accesskit_unix are released in lockstep from the same
      # repo (accesskit_unix depends on a matching accesskit), so a lone bump
      # of one would mismatch the other. Same rationale as objc2 above.
      accesskit:
        patterns:
          - "accesskit"
          - "accesskit*"
      # atspi and atspi-common (used by the accessibility acceptance tests)
      # are version-coupled 0.x crates from the same repo and must move
      # together. Same rationale as objc2 above.
      atspi:
        patterns:
          - "atspi"
          - "atspi-*"
      # Group only non-breaking (minor/patch) bumps so they land in a single
      # PR. Major bumps are excluded and arrive as separate, reviewable PRs,
      # since they routinely carry breaking API changes (e.g. iced 0.13->0.14,
      # quick-xml 0.31->0.39) that need a manual migration.
      cargo-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /shell-integration/windows
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      cargo-deps-windows:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      github-actions-deps:
        patterns: ["*"]
