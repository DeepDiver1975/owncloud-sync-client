version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      # Group only non-breaking (minor/patch) bumps so they land in a single
      # PR. Major bumps are excluded and arrive as separate, reviewable PRs,
      # since they routinely carry breaking API changes (e.g. iced 0.13->0.14,
      # quick-xml 0.31->0.39) that need a manual migration.
      cargo-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /shell-integration/windows
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      cargo-deps-windows:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      github-actions-deps:
        patterns: ["*"]
