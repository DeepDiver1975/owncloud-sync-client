version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      cargo-deps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /shell-integration/windows
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      cargo-deps-windows:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - DeepDiver1975
    groups:
      github-actions-deps:
        patterns: ["*"]
