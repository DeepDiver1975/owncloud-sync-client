name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Main workspace — Linux (canonical CI gate)
  # ---------------------------------------------------------------------------
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get install -y libdbus-1-dev pkg-config libsecret-1-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Main workspace — macOS (catches platform-specific compilation issues)
  # ---------------------------------------------------------------------------
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Windows shell-integration — cross-platform subset only.
  # oc-contextmenu contains pure-Rust menu_builder tests that run on any host.
  # oc-overlay and oc-ipc require a Windows host and are not tested here.
  # ---------------------------------------------------------------------------
  test-windows-contextmenu:
    name: Test oc-contextmenu (cross-platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: shell-integration/windows

      - name: Test oc-contextmenu
        run: cargo test --manifest-path shell-integration/windows/Cargo.toml -p oc-contextmenu

  # ---------------------------------------------------------------------------
  # macOS Swift extensions — build + XCTest
  # ---------------------------------------------------------------------------
  test-swift:
    name: Test Swift extensions (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + test FinderSync
        run: |
          xcodebuild test \
            -project shell-integration/macos/FinderSync/FinderSync.xcodeproj \
            -scheme FinderSync \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
        continue-on-error: true  # Xcode project not yet created; remove once project exists

      - name: Build + test FileProvider
        run: |
          xcodebuild test \
            -project shell-integration/macos/FileProvider/FileProvider.xcodeproj \
            -scheme FileProvider \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
        continue-on-error: true  # Xcode project not yet created; remove once project exists

  # ---------------------------------------------------------------------------
  # Acceptance tests — full end-to-end with real oCIS instance
  # ---------------------------------------------------------------------------
  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libsecret-1-dev xvfb libxkbcommon-x11-0 mesa-vulkan-drivers gnome-keyring

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x960x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Start oCIS
        run: docker compose -f tests/docker/compose.yml up -d

      - name: Wait for oCIS health
        run: |
          for i in $(seq 1 30); do
            curl -fks https://localhost:9200/health && break || sleep 2
          done

      - name: Build ocsyncd and ocsync
        run: cargo build -p daemon -p gui

      - name: Start gnome-keyring (headless secret service)
        run: |
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
          echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> $GITHUB_ENV
          echo "" | gnome-keyring-daemon --unlock --daemonize --components=secrets

      - name: Run acceptance tests
        run: OCIS_ACCEPTANCE=1 cargo test -p acceptance-test -- --nocapture

      - name: Stop oCIS
        if: always()
        run: docker compose -f tests/docker/compose.yml down
