name: Feature request
description: Suggest an idea or enhancement for the ownCloud Sync Client
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you're
        trying to solve so we can find the best solution together.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you facing? What are you trying to achieve?
      placeholder: "I'm frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution or behavior you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or links about the request here.
    validations:
      required: false
