[package]
name = "gui"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "ocsync"
path = "src/main.rs"

[dependencies]
iced = { version = "0.13", features = ["tokio", "svg"] }
tray-icon = { version = "0.19", optional = true }
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true }
uuid = { workspace = true }
anyhow = "1"
thiserror = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
daemon = { path = "../daemon" }
accesskit = { version = "0.24", optional = true }
accesskit_unix = { version = "0.21", optional = true, default-features = false, features = ["tokio"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[features]
default = ["tray-icon"]
tray-icon = ["dep:tray-icon"]
test-accessibility = ["dep:accesskit", "dep:accesskit_unix"]

[build-dependencies]
resvg = "0.42"
tiny-skia = "0.11"
png = "0.17"
